<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">DeepSeek Science logo</title>
  <desc id="desc">
    A deep-blue whale mark wrapped by scientific orbit lines and kernel nodes.
  </desc>
  <defs>
    <linearGradient id="whale" x1="116" x2="390" y1="326" y2="185" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08246f"/>
      <stop offset="0.58" stop-color="#0d3cb2"/>
      <stop offset="1" stop-color="#1769ff"/>
    </linearGradient>
    <linearGradient id="orbit" x1="92" x2="420" y1="96" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d73ff"/>
      <stop offset="1" stop-color="#0a2f91"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#06153d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g fill="none" stroke="url(#orbit)" stroke-linecap="round" stroke-width="13" opacity="0.92">
